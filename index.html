<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🐚 Terminal Web · Arquitectura de Programación</title>
    <style>
      * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e1a;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            padding: 16px;
            min-height: 100vh;
        }

        .terminal-window {
            max-width: 1400px;
            margin: 0 auto;
            background: #0c0f1c;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.15);
            border: 1px solid #2a3a3a;
            overflow: hidden;
        }

        .terminal-bar {
            background: #1a1f2e;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #2a3a3a;
        }
        .terminal-buttons {
            display: flex;
            gap: 8px;
        }
        .term-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .term-btn.red { background: #ff5f56; }
        .term-btn.yellow { background: #ffbd2e; }
        .term-btn.green { background: #27c93f; }
        .terminal-title {
            color: #9aaebf;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .search-area {
            display: flex;
            gap: 6px;
            background: #0a0e1a;
            padding: 4px 12px;
            border-radius: 24px;
            border: 1px solid #2a3a3a;
        }
        .search-area input {
            background: transparent;
            border: none;
            color: #c3e88d;
            font-family: monospace;
            font-size: 0.8rem;
            outline: none;
            width: 140px;
        }
        .search-area input::placeholder { color: #5a6e6e; }
        .search-area button {
            background: none;
            border: none;
            color: #7cb342;
            cursor: pointer;
            font-weight: bold;
        }
        .help-icon {
            background: #1a2a2a;
            border: 1px solid #2a3a3a;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #c3e88d;
        }

        .terminal-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }
        .checklist-panel {
            flex: 1;
            min-width: 220px;
            background: #0b0f17;
            border-right: 1px solid #2a3a3a;
            padding: 1rem;
            max-height: 70vh;
            overflow-y: auto;
        }
        .tree-panel {
            flex: 3;
            min-width: 260px;
            background: #0c0f1c;
            padding: 1rem;
            overflow-x: auto;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* ========== NUEVO: COLOR DE CONECTORES Y TEXTO BASE ========== */
        .tree-container,
        .tree-container pre,
        .tree-line {
            color: #ffcb6b;  /* amarillo cálido para conectores y texto normal */
        }
        .node-link {
            color: #89ddff;  /* azul para los enlaces (nodos clickeables) */
            text-decoration: none;
            font-weight: 500;
            background: #1a2a2a;
            padding: 2px 6px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.1s;
        }
        .node-link:active {
            background: #7cb342;
            color: #0c0f1c;
        }
        /* ========================================================== */

        .checklist-header {
            color: #7cb342;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            border-left: 3px solid #7cb342;
            padding-left: 10px;
            font-weight: bold;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            padding: 4px 6px;
            font-family: monospace;
            font-size: 0.8rem;
            cursor: pointer;
            border-bottom: 1px dotted #2a3a3a;
        }
        .checklist-item input {
            width: 18px;
            height: 18px;
            accent-color: #7cb342;
            cursor: pointer;
        }
        .checklist-item label {
            flex: 1;
            color: #c3e88d;
            cursor: pointer;
        }
        .checked-label {
            text-decoration: line-through;
            color: #6a7a6a;
        }
        .reset-checklist {
            background: #1a2a2a;
            border: 1px solid #3a4a4a;
            color: #ffaa66;
            padding: 6px 12px;
            border-radius: 20px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-family: monospace;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-card {
            background: #0c0f1c;
            border: 1px solid #7cb342;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            animation: fadeUp 0.2s;
            overflow: hidden;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            background: #1a1f2e;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a3a;
        }
        .modal-header h3 {
            color: #7cb342;
            font-size: 1rem;
        }
        .close-modal {
            background: none;
            border: none;
            color: #ffaa66;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-body {
            padding: 1rem;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #c3e88d;
            max-height: 55vh;
            overflow-y: auto;
            font-family: monospace;
        }
        .modal-footer {
            padding: 10px;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            border-top: 1px solid #2a3a3a;
        }
        .btn-study {
            background: #1a3a2a;
            border: 1px solid #7cb342;
            color: #c3e88d;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
        }
        .btn-sec {
            background: #1a2a2a;
            border: 1px solid #5a6e6e;
            color: #c3e88d;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }
        .terminal-footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 0.8rem;
            border-top: 1px solid #2a3a3a;
            color: #5a6e6e;
            background: #0b0f17;
        }

        @media (max-width: 700px) {
            .terminal-layout {
                flex-direction: column;
            }
            .checklist-panel {
                border-right: none;
                border-bottom: 1px solid #2a3a3a;
                max-height: 40vh;
            }
            .tree-panel {
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>
<div class="terminal-window">
    <div class="terminal-bar">
        <div class="terminal-buttons">
            <div class="term-btn red"></div>
            <div class="term-btn yellow"></div>
            <div class="term-btn green"></div>
        </div>
        <div class="terminal-title">🐚 developer@terminal:~/arquitectura_web</div>
        <div style="display: flex; gap: 8px;">
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="buscar concepto...">
                <button id="searchBtn">🔍</button>
            </div>
            <div class="help-icon" id="helpBtn">❔ help</div>
        </div>
    </div>

    <div class="terminal-layout">
        <!-- CHECKLIST a la izquierda -->
        <div class="checklist-panel">
            <div class="checklist-header">📋 PROGRESO DE ESTUDIO</div>
            <div id="checklistContainer"></div>
            <button id="resetChecklistBtn" class="reset-checklist">⟳ reiniciar checklist</button>
        </div>

        <!-- ÁRBOL a la derecha -->
        <div class="tree-panel">
            <div class="tree-container" id="treeContainer">
                <pre id="treeRender" style="margin:0; font-family: inherit;"></pre>
            </div>
        </div>
    </div>

    <div class="terminal-footer">
        🧠 Hecho en Venezuela · Desarrollado por Gerard Sieveres | Modo terminal · toca cualquier nodo verde
    </div>
</div>

<!-- MODAL EXPLICACIÓN -->
<div id="conceptModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle">📘 concepto</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button id="modalMarkStudied" class="btn-study">✔️ marcar estudiado</button>
            <button id="modalCloseFooter" class="btn-sec">cerrar</button>
        </div>
    </div>
</div>

function getExplanation(node) {
    let clean = node.trim();
    if (explanations[clean]) return explanations[clean];
    const lower = clean.toLowerCase();
    for (let key in explanations) {
        if (lower.includes(key.toLowerCase()) || key.toLowerCase().includes(lower)) {
            return explanations[key];
        }
    }
    return `📘 "${node}" es un componente técnico dentro de la arquitectura web. Puedes sugerir su definición.`;
}

// --------------------------------------------------------------
// RENDER DEL ÁRBOL (enlaces clickeables)
// --------------------------------------------------------------
function renderTree() {
    const container = document.getElementById('treeRender');
    container.innerHTML = '';
    const lines = fullTree.split('\n');
    for (let line of lines) {
        const match = line.match(/^([│├└─\s]*)(.*)$/);
        const prefix = match[1];
        const nodeText = match[2].trim();
        if (!nodeText || line.match(/^[│├└─\s]+$/)) {
            container.appendChild(document.createTextNode(line + '\n'));
            continue;
        }
        const span = document.createElement('span');
        span.style.display = 'block';
        span.style.whiteSpace = 'pre';
        const prefixSpan = document.createElement('span');
        prefixSpan.textContent = prefix;
        const link = document.createElement('a');
        link.className = 'node-link';
        link.textContent = nodeText;
        link.href = '#';
        link.addEventListener('click', (e) => {
            e.preventDefault();
            showExplanationModal(nodeText);
        });
        span.appendChild(prefixSpan);
        span.appendChild(link);
        container.appendChild(span);
        container.appendChild(document.createTextNode('\n'));
    }
}

// --------------------------------------------------------------
// MODAL Y CHECKLIST
// --------------------------------------------------------------
let currentConcept = "";
const modal = document.getElementById('conceptModal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
function showExplanationModal(concept) {
    currentConcept = concept;
    modalTitle.innerText = `📘 ${concept}`;
    modalBody.innerText = getExplanation(concept);
    modal.style.display = 'flex';
}
function closeModal() { modal.style.display = 'none'; }

// Lista de conceptos para checklist
const conceptosClave = [
    "HTML", "<head>", "<body>", "meta charset", "meta viewport", "title", "CSS", "JAVASCRIPT",
    "BACKEND", "SQL", "MySQL", "PostgreSQL", "Node.js", "TypeScript", "React", "PHP", "SPAs", "Event Loop",
    "LAMP", "MEAN", "XAMPP", "MERN", "LEMP", "PERN", "WAMP"
];
let checklist = {};
function loadChecklist() {
    const stored = localStorage.getItem("terminalChecklist");
    if (stored) checklist = JSON.parse(stored);
    else conceptosClave.forEach(c => checklist[c] = false);
}
function saveChecklist() { localStorage.setItem("terminalChecklist", JSON.stringify(checklist)); }
function renderChecklist() {
    const container = document.getElementById('checklistContainer');
    if (!container) return;
    container.innerHTML = "";
    for (let c of conceptosClave) {
        const div = document.createElement('div');
        div.className = 'checklist-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checklist[c] || false;
        cb.addEventListener('change', (e) => {
            checklist[c] = e.target.checked;
            saveChecklist();
            renderChecklist();
        });
        const label = document.createElement('label');
        label.textContent = c;
        if (checklist[c]) label.classList.add('checked-label');
        div.appendChild(cb);
        div.appendChild(label);
        container.appendChild(div);
    }
}
function markCurrentAsStudied() {
    let found = conceptosClave.find(c => currentConcept.includes(c) || c.includes(currentConcept));
    if (found) {
        checklist[found] = true;
        saveChecklist();
        renderChecklist();
        modalBody.innerHTML += `<br><span style="color:#7cb342;">✅ Marcado "${found}" como estudiado</span>`;
        setTimeout(() => { modalBody.innerText = getExplanation(currentConcept); }, 1500);
    } else {
        alert(`"${currentConcept}" no está en el checklist, pero puedes estudiarlo igual.`);
    }
}

// --------------------------------------------------------------
// BUSCADOR Y AYUDA
// --------------------------------------------------------------
function searchNode() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!query) return;
    const links = document.querySelectorAll('.node-link');
    for (let link of links) {
        if (link.textContent.toLowerCase().includes(query)) {
            link.scrollIntoView({ behavior: 'smooth', block: 'center' });
            link.style.backgroundColor = '#7cb342';
            link.style.color = '#0c0f1c';
            setTimeout(() => {
                link.style.backgroundColor = '';
                link.style.color = '';
            }, 1500);
            showExplanationModal(link.textContent);
            return;
        }
    }
    // Si no está en el árbol, buscar en el diccionario
    if (explanations[query] || Object.keys(explanations).some(k => k.toLowerCase().includes(query))) {
        showExplanationModal(query);
    } else {
        alert("Concepto no encontrado. Prueba con: LAMP, HTML, JavaScript, etc.");
    }
}

// --------------------------------------------------------------
// INICIALIZACIÓN
// --------------------------------------------------------------
window.onload = () => {
    renderTree();
    loadChecklist();
    renderChecklist();

    // Eventos modales
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('modalCloseFooter').addEventListener('click', closeModal);
    document.getElementById('modalMarkStudied').addEventListener('click', markCurrentAsStudied);
    document.getElementById('resetChecklistBtn').addEventListener('click', () => {
        if (confirm("¿Reiniciar todo el progreso de estudio?")) {
            conceptosClave.forEach(c => checklist[c] = false);
            saveChecklist();
            renderChecklist();
        }
    });
    document.getElementById('searchBtn').addEventListener('click', searchNode);
    document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchNode(); });
    document.getElementById('helpBtn').addEventListener('click', () => {
        alert("🐚 Terminal de estudio:\n• Haz clic en cualquier nodo verde para ver su definición.\n• Marca los conceptos en la lista izquierda para seguir tu progreso.\n• Usa el buscador para encontrar rápidamente un tema.\n• El progreso se guarda automáticamente.");
    });
};
