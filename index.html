        .tree-container pre { margin: 0; font-family: inherit; white-space: pre; }
        .node-link { color: #0f6b5e; text-decoration: none; font-weight: 600; background: #e6f4f1; padding: 2px 6px; border-radius: 24px; cursor: pointer; display: inline-block; margin: 1px 0; transition: 0.1s; }
        .node-link:active { background: #f4c542; transform: scale(0.97); }
        .fab { position: fixed; bottom: 20px; right: 20px; background: #f4c542; border: none; border-radius: 60px; padding: 12px 20px; font-weight: bold; box-shadow: 0 6px 14px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px; cursor: pointer; z-index: 99; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal-card { background: white; max-width: 500px; width: 90%; border-radius: 2rem; animation: fadeUp 0.2s; overflow: hidden; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header { background: #0b2b26; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.2rem; }
        .close-modal { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: white; }
        .modal-body { padding: 1.2rem; font-size: 0.9rem; line-height: 1.5; max-height: 55vh; overflow-y: auto; color: #1e2a2a; }
        .modal-footer { padding: 0.8rem; display: flex; gap: 1rem; justify-content: flex-end; border-top: 1px solid #e2e8f0; }
        .btn-study { background: #f4c542; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .btn-sec { background: #e2e8f0; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; }
        .checklist-item { display: flex; align-items: center; gap: 12px; margin: 12px 0; background: #f9f9f9; padding: 6px 12px; border-radius: 60px; }

        .checklist-item label { flex: 1; font-size: 0.85rem; }
        .checked-label { text-decoration: line-through; color: #8a9a96; }
        .credit { text-align: center; font-size: 0.7rem; padding: 0.8rem; background: #fefcf5; color: #4b6b65; border-top: 1px solid #e2e8f0; }

function getExplanation(node) {
    let clean = node.trim();
    if (explanations[clean]) return explanations[clean];
    // Búsqueda por coincidencia parcial (ignorando mayúsculas)
    const lower = clean.toLowerCase();
    for (let key in explanations) {
        if (lower.includes(key.toLowerCase()) || key.toLowerCase().includes(lower)) {
            return explanations[key];
        }
    }
    return `📘 "${node}" es un componente técnico dentro de la arquitectura web. Si deseas agregar su definición, puedes sugerirla para futuras versiones.`;
}

// --------------------------------------------------------------
// RENDER DEL ÁRBOL (con enlaces clickeables)
// --------------------------------------------------------------
function renderTree() {
    const container = document.getElementById('treeRender');
    container.innerHTML = '';
    const lines = fullTree.split('\n');
    for (let line of lines) {
        const match = line.match(/^([│├└─\s]*)(.*)$/);
        const prefix = match[1];
        const nodeText = match[2].trim();
        if (!nodeText || line.match(/^[│├└─\s]+$/)) {
            container.appendChild(document.createTextNode(line + '\n'));
            continue;
        }
        const span = document.createElement('span');
        span.style.display = 'block';
        span.style.whiteSpace = 'pre';
        const prefixSpan = document.createElement('span');
        prefixSpan.textContent = prefix;
        const link = document.createElement('a');
        link.className = 'node-link';
        link.textContent = nodeText;
        link.href = '#';
        link.addEventListener('click', (e) => {
            e.preventDefault();
            showExplanationModal(nodeText);
        });
        span.appendChild(prefixSpan);
        span.appendChild(link);
        container.appendChild(span);
        container.appendChild(document.createTextNode('\n'));
    }
}

// --------------------------------------------------------------
// MODAL DE EXPLICACIÓN Y CHECKLIST
// --------------------------------------------------------------
let currentConcept = "";
const modal = document.getElementById('conceptModal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
function showExplanationModal(concept) {
    currentConcept = concept;
    modalTitle.innerText = `📘 ${concept}`;
    modalBody.innerText = getExplanation(concept);
    modal.style.display = 'flex';
}
function closeModal() { modal.style.display = 'none'; }

// Checklist (incluye los nuevos conceptos)
const conceptosClave = [
    "HTML", "<head>", "<body>", "meta charset", "meta viewport", "title", "CSS", "JAVASCRIPT",
    "BACKEND", "SQL", "MySQL", "PostgreSQL", "Node.js", "TypeScript", "React", "PHP", "SPAs", "Event Loop",
    "LAMP", "MEAN", "XAMPP", "MERN", "LEMP", "PERN", "WAMP"
];
let checklist = {};
function loadChecklist() {
    const stored = localStorage.getItem("webCompletaChecklist");
    if (stored) checklist = JSON.parse(stored);
    else conceptosClave.forEach(c => checklist[c] = false);
}
function saveChecklist() { localStorage.setItem("webCompletaChecklist", JSON.stringify(checklist)); }
function renderChecklist() {
    const container = document.getElementById('checklistContainer');
    if (!container) return;
    container.innerHTML = "";
    for (let c of conceptosClave) {
        const div = document.createElement('div');
        div.className = 'checklist-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checklist[c] || false;
        cb.addEventListener('change', (e) => {
            checklist[c] = e.target.checked;
            saveChecklist();
            renderChecklist();
        });
        const label = document.createElement('label');
        label.textContent = c;
        if (checklist[c]) label.classList.add('checked-label');
        div.appendChild(cb);
        div.appendChild(label);
        container.appendChild(div);
    }
}
function markCurrentAsStudied() {
    let found = conceptosClave.find(c => currentConcept.includes(c) || c.includes(currentConcept));
    if (found) {
        checklist[found] = true;
        saveChecklist();
        renderChecklist();
        modalBody.innerHTML += `<br><span style="color:#0b6b5e;">✅ Marcado "${found}" como estudiado</span>`;
        setTimeout(() => { modalBody.innerText = getExplanation(currentConcept); }, 1500);
    } else {
        alert(`"${currentConcept}" no está en el checklist, pero puedes estudiarlo igual.`);
    }
}

// --------------------------------------------------------------
// EVENTOS GLOBALES
// --------------------------------------------------------------
const checklistModal = document.getElementById('checklistModal');
function openChecklistModal() { renderChecklist(); checklistModal.style.display = 'flex'; }
function closeChecklistModal() { checklistModal.style.display = 'none'; }

function searchNode() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!query) return;
    const links = document.querySelectorAll('.node-link');
    for (let link of links) {
        if (link.textContent.toLowerCase().includes(query)) {
            link.scrollIntoView({ behavior: 'smooth', block: 'center' });
            link.style.backgroundColor = '#f4c542';
            setTimeout(() => link.style.backgroundColor = '', 1500);
            showExplanationModal(link.textContent);
            return;
        }
    }
    // Búsqueda en diccionario si no se encuentra en el árbol
    if (explanations[query] || Object.keys(explanations).some(k => k.toLowerCase().includes(query))) {
        showExplanationModal(query);
    } else {
        alert("Nodo no encontrado. Prueba: LAMP, HTML, CSS, JavaScript, etc.");
    }
}

window.onload = () => {
    renderTree();
    loadChecklist();
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
        if (e.target === checklistModal) closeChecklistModal();
    });
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('modalCloseFooter').addEventListener('click', closeModal);
    document.getElementById('modalMarkStudied').addEventListener('click', markCurrentAsStudied);
    document.getElementById('openChecklistBtn').addEventListener('click', openChecklistModal);
    document.getElementById('closeChecklistBtn').addEventListener('click', closeChecklistModal);
    document.getElementById('resetChecklistBtn').addEventListener('click', () => {
        if (confirm("¿Reiniciar todo el progreso?")) {
            conceptosClave.forEach(c => checklist[c] = false);
            saveChecklist();
            renderChecklist();
        }
    });
    document.getElementById('searchBtn').addEventListener('click', searchNode);
    document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchNode(); });
    document.getElementById('helpBtn').addEventListener('click', () => {
        alert("📘 Cómo usar:\n• Toca cualquier texto verde del árbol → tarjeta con definición.\n• Botón 'Progreso' → checklist de conceptos.\n• Busca palabras clave (ej. LAMP, HTML, Event Loop).\n• Marca 'estudiado' dentro de la tarjeta para guardar avance.");
    });
};
